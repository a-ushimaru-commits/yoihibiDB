<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>よい日々 売上進捗ダッシュボード</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="top-accent-bar"></div>
<div class="page-header-row">
  <div class="brand-title">
    <span class="brand-mark">日</span>
    <h1>よい日々 売上進捗ダッシュボード</h1>
  </div>
  <div class="month-selector">
    対象月:
    <select id="monthSelect"></select>
  </div>
</div>
<p id="status"></p>
<div id="warnings"></div>
<div id="brandWarnings"></div>
<div id="janCostWarning"></div>

<div class="kpi-row-with-upload">
  <div id="kpiRow" class="kpi-row"></div>
  <div id="dropzone" class="dropzone">
    ここに1期実績xlsx／月次実績xlsx／日次売上csv／商品コード→ブランド対応表xlsxをドラッグ&ドロップ、または
    <input type="file" id="fileInput" multiple accept=".xlsx,.csv">
  </div>
</div>

<div class="kpi-row-with-upload">
  <div id="ownChannelKpiRow" class="kpi-row"></div>
  <div class="kpi-row-spacer" aria-hidden="true"></div>
</div>

<h2>自社 月別サマリー（定期/通常比較 + ブランド別×月次）</h2>
<div id="ownChannelMonthlySummary"></div>

<h2>自社 月次推移（ブランド×定期/通常）</h2>
<div id="ownChannelBrandMonthlyPivot"></div>

<h2>月次推移（ブランド×定期/通常）</h2>
<div id="brandMonthlyPivot"></div>

<h2>月次推移（媒体×定期/通常）</h2>
<div id="channelMonthlyPivot"></div>

<div class="chart-row chart-row-quad">
  <div class="chart-card">
    <p class="chart-card-title">売上（月次推移）</p>
    <div class="chart-canvas-wrap"><canvas id="trendSalesChart"></canvas></div>
  </div>
  <div class="chart-card">
    <p class="chart-card-title">売上（当月累積）</p>
    <div class="chart-canvas-wrap"><canvas id="dailySalesChart"></canvas></div>
  </div>
  <div class="chart-card">
    <p class="chart-card-title">数量（月次推移）</p>
    <div class="chart-canvas-wrap"><canvas id="trendQtyChart"></canvas></div>
  </div>
  <div class="chart-card">
    <p class="chart-card-title">数量（当月累積）</p>
    <div class="chart-canvas-wrap"><canvas id="dailyQtyChart"></canvas></div>
  </div>
</div>

<div id="channelTable"></div>
<h2>ブランド別</h2>
<div id="brandTable"></div>

<details class="settings-panel">
  <summary>設定</summary>
  <p>
    今月の目標　売上: <input type="number" id="salesTargetInput" placeholder="円">
    粗利: <input type="number" id="profitTargetInput" placeholder="円">
  </p>
  <p>
    <button id="exportBtn">データを書き出し(JSON)</button>
    データを読み込み: <input type="file" id="importInput" accept=".json">
    <button id="clearBtn">全データをクリア</button>
  </p>
</details>

<script src="js/vendor/xlsx.full.min.js"></script>
<script src="js/vendor/chart.umd.js"></script>
<script src="js/mapping.js"></script>
<script src="js/parsers.js"></script>
<script src="js/store.js"></script>
<script src="js/aggregate.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
